name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and upload Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use stable Rust
        run: rustup default stable

      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $package = $metadata.packages | Where-Object { $_.name -eq "lol-auto-accept" } | Select-Object -First 1
          "version=$($package.version)" >> $env:GITHUB_OUTPUT

      - name: Check existing release
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.package.outputs.version }}"
          gh release view $tag *> $null

          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag already exists. Skipping build and upload."
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }

          exit 0

      - name: Run tests
        if: steps.release.outputs.exists != 'true'
        run: cargo test --profile release --locked

      - name: Build release executable
        if: steps.release.outputs.exists != 'true'
        run: cargo build --profile release --locked

      - name: Upload executable to release
        if: steps.release.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.package.outputs.version }}"
          $asset = "target/release/lol-auto-accept.exe"
          gh release create $tag $asset --target $env:GITHUB_SHA --title $tag --generate-notes --latest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
